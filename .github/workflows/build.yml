name: Build Majora iOS
on: 
  push:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          repository: Francessco121/Zelda64Recomp
          submodules: recursive
          fetch-depth: 1

      - name: Configurar Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Instalar Dependencias del Sistema
        run: |
          brew install cmake ninja freetype pkg-config

      - name: Descargar y Preparar SDL2 para iOS
        run: |
          git clone https://github.com/libsdl-org/SDL.git -b SDL2
          cd SDL
          mkdir build-ios
          cd build-ios
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_INSTALL_PREFIX=../../sdl2_ios \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF
          ninja install

      - name: Configurar Proyecto para iOS
        run: |
          # 1. Archivos dummy (Corrección de rutas aplicada)
          mkdir -p RecompiledPatches RecompiledFuncs patches rsp
          touch rsp/aspMain.cpp rsp/njpgdspMain.cpp
          echo "void dummy_recomp() {}" > recompiled_funcs.cpp
          
          touch RecompiledPatches/patches.c RecompiledPatches/funcs.h
          touch RecompiledPatches/patches_bin.c RecompiledPatches/patches_bin.h
          touch RecompiledFuncs/recomp_overlays.inl
          
          echo "target_sources(RecompiledFuncs PRIVATE \${CMAKE_CURRENT_SOURCE_DIR}/recompiled_funcs.cpp)" >> CMakeLists.txt
          
          # 2. Neutralizar N64Recomp (Sin romper file_to_c)
          echo "all:" > patches/Makefile
          echo "clean:" > patches/Makefile
          # EL TRUCO: Un archivo binario válido de 1 byte en vez de uno vacío
          echo -n -e '\x00' > patches/patches.bin
          
          find . -name "CMakeLists.txt" -exec sed -i '' 's/COMMAND \.\/N64Recomp/# COMMAND/g' {} +

          # 3. TRUCO DE CROSS-COMPILING: Crear versión nativa de file_to_c
          FILE_TO_C_SRC=$(find . -name "file_to_c.cpp" | head -n 1)
          clang++ -std=c++17 $FILE_TO_C_SRC -o $GITHUB_WORKSPACE/file_to_c_mac
          chmod +x $GITHUB_WORKSPACE/file_to_c_mac
          
          # Engañamos a CMake para que use el ejecutable de Mac
          find . -name "CMakeLists.txt" -exec sed -i '' "s|COMMAND \./file_to_c|COMMAND $GITHUB_WORKSPACE/file_to_c_mac|g" {} +
          find . -name "CMakeLists.txt" -exec sed -i '' "s|COMMAND file_to_c|COMMAND $GITHUB_WORKSPACE/file_to_c_mac|g" {} +
          find . -name "CMakeLists.txt" -exec sed -i '' "s|\\\$<TARGET_FILE:file_to_c>|$GITHUB_WORKSPACE/file_to_c_mac|g" {} +

          # 4. Modernización a iOS 17
          find . -name "CMakeLists.txt" -exec sed -i '' 's/10.15/17.0/g' {} +
          echo "" > lib/rt64/src/contrib/nativefiledialog-extended/src/CMakeLists.txt

          # 5. PARCHES DEFINITIVOS (SHADERS, SLJIT Y TRADUCCIÓN MACOS -> IOS)
          find . -name "CMakeLists.txt" -exec sed -i '' 's/COMMAND spirv_cross_msl/COMMAND touch/g' {} +
          find . -name "CMakeLists.txt" -exec sed -i '' 's/-sdk macosx/-sdk iphoneos/g' {} +

          # Reemplazar librerías de Mac por iOS
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/AppKit\/AppKit.h/UIKit\/UIKit.h/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/Cocoa\/Cocoa.h/UIKit\/UIKit.h/g' {} +
          
          # Traducción de tipos (Rosetta Stone para el código)
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/NSWindow/UIWindow/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/NSView/UIView/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/NSRect/CGRect/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/NSSize/CGSize/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/NSPoint/CGPoint/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/NSScreen/UIScreen/g' {} +
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' 's/contentView/self/g' {} +
          
          # Eliminar comandos exclusivos de macOS
          find lib/rt64/src/apple -name "*.mm" -exec sed -i '' '/toggleFullScreen/d' {} +
          
          # SDL2: Cambiar el subsistema de ventanas de Cocoa (Mac) a UIKit (iOS)
          find src -name "*.cpp" -exec sed -i '' 's/info.cocoa.window/info.uikit.window/g' {} +

          echo "#define SLJIT_CONFIG_ARM_64 1" > temp_sljit.h
          echo "#define SLJIT_UPDATE_WX_FLAGS(p1, p2, p3)" >> temp_sljit.h
          cat lib/N64ModernRuntime/N64Recomp/lib/sljit/sljit_src/sljitConfigInternal.h >> temp_sljit.h
          mv temp_sljit.h lib/N64ModernRuntime/N64Recomp/lib/sljit/sljit_src/sljitConfigInternal.h

          mkdir build
          cd build
          FREETYPE_PATH=$(brew --prefix freetype)

          # 6. CMAKE (AÑADIDAS RUTAS GLOBALES PARA SDL2)
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_CXX_FLAGS="-miphoneos-version-min=17.0 -I$GITHUB_WORKSPACE/sdl2_ios/include/SDL2 -I$GITHUB_WORKSPACE/sdl2_ios/include" \
            -DCMAKE_C_FLAGS="-miphoneos-version-min=17.0 -I$GITHUB_WORKSPACE/sdl2_ios/include/SDL2 -I$GITHUB_WORKSPACE/sdl2_ios/include" \
            -DSDL2_DIR=$GITHUB_WORKSPACE/sdl2_ios/lib/cmake/SDL2 \
            -DFREETYPE_INCLUDE_DIRS=$FREETYPE_PATH/include/freetype2 \
            -DFREETYPE_LIBRARY=$FREETYPE_PATH/lib/libfreetype.a \
            -DRECOMP_PLATFORM=iOS \
            -DUSE_OPENGL=OFF \
            -DUSE_VULKAN=OFF \
            -DUSE_METAL=ON \
            -DNFD_PORTABLE=OFF \
            -DNFD_GTK=OFF \
            -DNFD_MACOS=OFF \
            -DENABLE_NFD=OFF \
            -DAPPKIT_LIBRARY=""
            
      - name: Compilar
        run: |
          cd build
          # Limitamos a 4 procesos en paralelo para que el servidor no vuelva a asfixiarse
          ninja -j4

