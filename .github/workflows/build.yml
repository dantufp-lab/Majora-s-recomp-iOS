name: Build Majora iOS
on: 
  push:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          repository: Francessco121/Zelda64Recomp
          submodules: recursive
          fetch-depth: 1

      - name: Configurar Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Instalar Dependencias del Sistema
        run: |
          brew install cmake ninja freetype pkg-config

      - name: Descargar y Preparar SDL2 para iOS
        run: |
          git clone https://github.com/libsdl-org/SDL.git -b SDL2
          cd SDL
          mkdir build-ios
          cd build-ios
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_INSTALL_PREFIX=../../sdl2_ios \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF
          ninja install

      - name: Configurar Proyecto para iOS
        run: |
          # 1. Archivos dummy
          mkdir -p RecompiledPatches patches rsp
          touch rsp/aspMain.cpp rsp/njpgdspMain.cpp
          echo "void dummy_recomp() {}" > recompiled_funcs.cpp
          
          touch RecompiledPatches/patches.c RecompiledPatches/recomp_overlays.inl RecompiledPatches/funcs.h
          touch RecompiledPatches/patches_bin.c RecompiledPatches/patches_bin.h
          
          echo "target_sources(RecompiledFuncs PRIVATE \${CMAKE_CURRENT_SOURCE_DIR}/recompiled_funcs.cpp)" >> CMakeLists.txt
          
          # 2. Neutralizar Patches antiguos
          echo "all:" > patches/Makefile
          echo "clean:" > patches/Makefile
          touch patches/patches.bin
          
          find . -name "CMakeLists.txt" -exec sed -i '' 's/COMMAND \.\/N64Recomp/# COMMAND/g' {} +
          find . -name "CMakeLists.txt" -exec sed -i '' 's/COMMAND \.\/file_to_c/# COMMAND/g' {} +
          find . -name "CMakeLists.txt" -exec sed -i '' 's/COMMAND file_to_c/# COMMAND/g' {} +

          # 3. Modernización a iOS 17
          find . -name "CMakeLists.txt" -exec sed -i '' 's/10.15/17.0/g' {} +
          echo "" > lib/rt64/src/contrib/nativefiledialog-extended/src/CMakeLists.txt

          # 4. PARCHE ANTIMEMORIA
          find . -name "CMakeLists.txt" -exec sed -i '' 's/COMMAND spirv_cross_msl/COMMAND touch/g' {} +

          mkdir build
          cd build
          FREETYPE_PATH=$(brew --prefix freetype)

          # 5. DESACTIVAR LIVERECOMP Y JIT
          # Hemos añadido -DENABLE_LIVE_RECOMP=OFF y otros comandos para apagar el JIT
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_CXX_FLAGS="-miphoneos-version-min=17.0 -DSLJIT_CONFIG_UNSUPPORTED=1" \
            -DSDL2_DIR=$GITHUB_WORKSPACE/sdl2_ios/lib/cmake/SDL2 \
            -DFREETYPE_INCLUDE_DIRS=$FREETYPE_PATH/include/freetype2 \
            -DFREETYPE_LIBRARY=$FREETYPE_PATH/lib/libfreetype.a \
            -DRECOMP_PLATFORM=iOS \
            -DUSE_OPENGL=OFF \
            -DUSE_VULKAN=OFF \
            -DUSE_METAL=ON \
            -DNFD_PORTABLE=OFF \
            -DNFD_GTK=OFF \
            -DNFD_MACOS=OFF \
            -DENABLE_NFD=OFF \
            -DAPPKIT_LIBRARY="" \
            -DENABLE_LIVE_RECOMP=OFF \
            -DENABLE_JIT=OFF
            
      - name: Compilar
        run: |
          cd build
          ninja
