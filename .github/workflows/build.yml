name: Build Majora iOS
on: 
  push:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          repository: Francessco121/Zelda64Recomp
          submodules: recursive
          fetch-depth: 1

      - name: Configurar Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Instalar Dependencias del Sistema
        run: brew install cmake ninja

      - name: Descargar SDL2 para iOS
        run: |
          git clone https://github.com/libsdl-org/SDL.git -b SDL2
          cd SDL
          mkdir build-ios
          cd build-ios
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_INSTALL_PREFIX=../../sdl2_ios
          ninja install

      - name: Configurar Proyecto para iOS
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DSDL2_DIR=$GITHUB_WORKSPACE/sdl2_ios/lib/cmake/SDL2 \
            -DRECOMP_PLATFORM=iOS \
            -DUSE_OPENGL=OFF \
            -DUSE_VULKAN=OFF \
            -DUSE_METAL=ON
            
      - name: Compilar
        run: |
          cd build
          ninja
